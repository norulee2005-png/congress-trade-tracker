name: Scrape STOCK Act Trades

on:
  schedule:
    # Every 6 hours
    - cron: '0 */6 * * *'
  workflow_dispatch:
    inputs:
      mode:
        description: 'Run mode: incremental (last 30d) or historical (last 12mo)'
        required: false
        default: 'incremental'
        type: choice
        options:
          - incremental
          - historical

jobs:
  scrape:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run trade scraper (incremental)
        if: ${{ github.event.inputs.mode != 'historical' }}
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
        run: npx tsx scripts/scrape-incremental.ts

      - name: Run trade scraper (historical)
        if: ${{ github.event.inputs.mode == 'historical' }}
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
        run: npx tsx scripts/seed.ts
